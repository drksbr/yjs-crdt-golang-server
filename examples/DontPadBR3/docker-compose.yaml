services:
  postgres:
    image: postgres:17-alpine
    container_name: dontpad-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dontpadbr3}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dontpad-network

  backend:
    container_name: dontpad-backend
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      DONTPAD_ADDR: ":8080"
      DONTPAD_SCHEMA: ${DONTPAD_SCHEMA:-dontpadbr3}
      DONTPAD_NAMESPACE: ${DONTPAD_NAMESPACE:-dontpadbr3}
      DONTPAD_DATA_DIR: /storage/data
      DONTPAD_ALLOWED_ORIGINS: "${DONTPAD_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required - generate with: openssl rand -hex 32}"
      MASTER_PASSWORD: ${MASTER_PASSWORD:-}
    volumes:
      - ../../storage/data:/storage/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dontpad-network
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.dontpad-backend.entrypoints=http
      - traefik.http.routers.dontpad-backend.rule=Host(`api-nova.dontpad.com.br`)
      - traefik.http.services.dontpad-backend.loadbalancer.server.port=8080

  app:
    container_name: dontpad
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DONTPAD_BACKEND_URL: "${DONTPAD_BACKEND_URL:-http://backend:8080}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required - generate with: openssl rand -hex 32}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dontpad-network
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.dontpad.entrypoints=http
      - traefik.http.routers.dontpad.rule=Host(`dontpad.com.br`) || Host(`www.dontpad.com.br`) || Host(`novo.dontpad.com.br`)
      - traefik.http.services.dontpad.loadbalancer.server.port=3000

volumes:
  postgres-data:

networks:
  dontpad-network:
    driver: bridge
  coolify:
    external: true
